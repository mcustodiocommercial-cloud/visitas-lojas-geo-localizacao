<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitas de Lojas</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d2d4f;
      --green: #3cb87a;
      --green-light: #6dd49e;
      --green-soft: rgba(60,184,122,0.13);
      --green-pale: #e8f7ef;
      --border: #c8e6d8;
      --surface: #fff;
      --surface2: #f0f7f4;
      --text: #0d2d4f;
      --dim: #6b8fa8;
      --orange: #f59e0b;
      --red: #e53e3e;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(13,45,79,0.08);
      --shadow-md: 0 4px 20px rgba(13,45,79,0.13);
      --font: 'Poppins', system-ui, sans-serif;
    }
    body { font-family: var(--font); background: #f5fbf8; color: var(--text); min-height: 100vh; }

    /* NAV */
    nav {
      background: var(--navy); height: 58px; padding: 0 16px;
      display: flex; align-items: center; gap: 4px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(13,45,79,0.2);
    }
    .logo { font-weight: 700; font-size: 0.95rem; color: var(--green-light); margin-right: auto; white-space: nowrap; }
    .logo em { color: #fff; font-style: normal; font-weight: 400; }
    nav button {
      background: none; border: none; color: rgba(255,255,255,0.6);
      font-family: var(--font); font-size: 0.8rem; font-weight: 500;
      padding: 6px 11px; border-radius: 8px; cursor: pointer;
      transition: all .15s; white-space: nowrap; flex-shrink: 0;
    }
    nav button:hover { background: rgba(255,255,255,0.1); color: #fff; }
    nav button.active { background: var(--green); color: #fff; }

    /* PAGES */
    .page { display: none; padding: 16px; max-width: 700px; margin: 0 auto; }
    .page.active { display: block; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 10px; text-align: center;
      box-shadow: var(--shadow);
    }
    .stat.blue  { border-top: 3px solid var(--navy); }
    .stat.green { border-top: 3px solid var(--green); }
    .stat.ora   { border-top: 3px solid var(--orange); }
    .stat .num  { font-size: 1.8rem; font-weight: 700; line-height: 1; }
    .stat.blue  .num { color: var(--navy); }
    .stat.green .num { color: var(--green); }
    .stat.ora   .num { color: var(--orange); }
    .stat .lbl  { font-size: 0.65rem; color: var(--dim); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; font-weight: 500; }

    /* SEARCH */
    .search-bar {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px; color: var(--text);
      font-family: var(--font); font-size: 0.88rem; margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .search-bar::placeholder { color: var(--dim); }
    .search-bar:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }

    /* PILLS */
    .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .pill {
      background: #fff; border: 1.5px solid var(--border);
      border-radius: 20px; padding: 4px 12px; font-size: 0.72rem; font-weight: 500;
      cursor: pointer; color: var(--dim); transition: all .15s; font-family: var(--font);
    }
    .pill:hover { border-color: var(--green); color: var(--green); }
    .pill.active { background: var(--green); border-color: var(--green); color: #fff; }

    /* LOJA ITEM */
    .loja-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 13px 15px; margin-bottom: 9px;
      display: flex; align-items: center; gap: 12px;
      transition: all .15s; box-shadow: var(--shadow);
    }
    .loja-item:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .loja-item.visitada { border-color: var(--green); border-left: 4px solid var(--green); background: linear-gradient(135deg,#fff,var(--green-pale)); }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; background: #d1e8dd; border: 2px solid var(--border); }
    .dot.ok { background: var(--green); border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
    .loja-info { flex: 1; min-width: 0; }
    .loja-nome { font-weight: 600; font-size: 0.87rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--navy); }
    .loja-end  { font-size: 0.72rem; color: var(--dim); margin-top: 2px; }
    .hora-ok   { font-size: 0.68rem; color: var(--green); margin-top: 2px; font-weight: 500; }
    .badge { font-size: 0.63rem; font-weight: 600; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; background: rgba(13,45,79,0.07); color: var(--navy); }
    .btn-marcar {
      background: var(--navy); color: #fff; border: none;
      padding: 7px 13px; border-radius: 8px;
      font-family: var(--font); font-size: 0.76rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all .15s; flex-shrink: 0;
    }
    .btn-marcar:hover { background: var(--green); }
    .btn-marcar:disabled { background: var(--green); cursor: default; opacity: .9; }

    /* CARD */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .card h3 { font-size: 0.92rem; margin-bottom: 14px; color: var(--navy); }

    /* UPLOAD */
    .upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 36px 20px; text-align: center; cursor: pointer;
      transition: all .2s; background: var(--surface2); margin-bottom: 14px;
    }
    .upload-area:hover, .upload-area.drag { border-color: var(--green); background: var(--green-pale); }
    .upload-area .icon { font-size: 2.2rem; margin-bottom: 8px; }
    .upload-area strong { color: var(--navy); display: block; margin-bottom: 4px; }
    .upload-area p { color: var(--dim); font-size: 0.8rem; }

    /* BTNS */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px; border-radius: 8px; font-size: 0.82rem;
      font-weight: 600; border: none; cursor: pointer; transition: all .15s; font-family: var(--font);
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-danger  { background: var(--red); color: #fff; }
    .btn-outline { background: none; border: 1.5px solid var(--border); color: var(--navy); }

    /* TABLE */
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.79rem; }
    th { background: var(--surface2); padding: 9px 12px; text-align: left; color: var(--navy); font-weight: 600; text-transform: uppercase; font-size: 0.64rem; letter-spacing: .06em; }
    td { padding: 8px 12px; border-top: 1px solid #edf5f1; }
    tr:hover td { background: var(--green-pale); }

    /* INPUTS */
    input[type=date], input[type=text], input[type=password] {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 8px 12px; color: var(--text);
      font-family: var(--font); font-size: 0.85rem;
    }
    input[type=date] { flex: 1; }
    input:focus { outline: none; border-color: var(--green); }
    label { display: block; font-size: 0.78rem; color: var(--dim); margin-bottom: 4px; font-weight: 500; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--navy); color: #fff; padding: 10px 20px;
      border-radius: 10px; font-size: 0.82rem; font-weight: 500;
      z-index: 9999; display: none; box-shadow: 0 6px 24px rgba(13,45,79,0.25);
      font-family: var(--font); white-space: nowrap;
    }
    #toast.show { display: block; animation: up .2s ease; }
    #toast.ok  { background: var(--green); }
    #toast.err { background: var(--red); }
    @keyframes up { from { transform:translateX(-50%) translateY(8px); opacity:0; } to { transform:translateX(-50%) translateY(0); opacity:1; } }

    /* LOADER / MSG */
    .msg { text-align: center; padding: 36px 20px; color: var(--dim); font-size: 0.85rem; }
    .msg.err { color: var(--red); }

    /* DIAGNÓSTICO */
    #diagBox {
      background: #fff8f0; border: 1.5px solid #f59e0b;
      border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
      font-size: 0.82rem; line-height: 1.6; display: none;
    }
    #diagBox strong { color: var(--navy); }
    #diagBox code { background: #f0f0f0; padding: 1px 5px; border-radius: 4px; font-size: 0.78rem; }

    /* MOBILE */
    @media (max-width: 480px) {
      .stat .num { font-size: 1.4rem; }
      nav button span { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <span class="logo">📍 Visitas <em>de Lojas</em></span>
  <button onclick="showPage('rotas')"    id="nav-rotas"    class="active">🗺️ <span>Rotas</span></button>
  <button onclick="showPage('historico')" id="nav-historico">📋 <span>Histórico</span></button>
  <button onclick="showPage('painel')"   id="nav-painel">⚙️ <span>Painel</span></button>
</nav>

<!-- ROTAS -->
<div class="page active" id="page-rotas">
  <div id="diagBox"></div>
  <div class="stats">
    <div class="stat blue"><div class="num" id="sTotal">—</div><div class="lbl">Total</div></div>
    <div class="stat green"><div class="num" id="sVisit">—</div><div class="lbl">Visitadas</div></div>
    <div class="stat ora"><div class="num" id="sPend">—</div><div class="lbl">Pendentes</div></div>
  </div>
  <input class="search-bar" type="text" placeholder="🔍 Buscar loja ou bairro..." oninput="filtrar()" id="busca" />
  <div class="pills" id="pills"></div>
  <div id="lista"><div class="msg">Conectando ao banco de dados...</div></div>
</div>

<!-- HISTÓRICO -->
<div class="page" id="page-historico">
  <div class="card">
    <div style="display:flex;gap:10px;align-items:center">
      <input type="date" id="dtHistorico" />
      <button class="btn btn-outline" onclick="carregarHistorico()">Buscar</button>
    </div>
  </div>
  <div id="tblHistorico"><div class="msg">Selecione uma data acima</div></div>
</div>

<!-- PAINEL -->
<div class="page" id="page-painel">
  <div class="card">
    <h3>📤 Importar lista de lojas</h3>
    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileIn').click()"
      ondrop="onDrop(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave()">
      <div class="icon">📂</div>
      <strong>Clique ou arraste o arquivo aqui</strong>
      <p>Aceita .xlsx, .xls e .csv</p>
    </div>
    <input type="file" id="fileIn" accept=".xlsx,.xls,.csv" style="display:none" onchange="onFile(event)" />
    <div id="preview"></div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <h3 style="margin:0">🏪 Lojas cadastradas</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" onclick="exportar()">⬇ Exportar</button>
        <button class="btn btn-danger"  onclick="limpar()">🗑 Limpar</button>
      </div>
    </div>
    <div id="tblLojas"><div class="msg">Carregando...</div></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ──
const SB_URL = 'https://giocnzylrabbiehfigdg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdpb2NuenlscmFiYmllaGZpZ2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODc0NTQsImV4cCI6MjA5ODI2MzQ1NH0.j5ZpMgRcYXbTwdMPOfa9cGI47ymENX3qXwN_vbHAIdE';

let sb, lojas = [], zonaAtiva = 'Todas';

function toast(msg, tipo='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + tipo;
  setTimeout(() => el.className = '', 3000);
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'historico') {
    document.getElementById('dtHistorico').value = hoje();
    carregarHistorico();
  }
  if (name === 'painel') carregarTabelaLojas();
}

function hoje() { return new Date().toISOString().split('T')[0]; }

// ── DIAGNÓSTICO ──
function mostrarDiag(erros) {
  const box = document.getElementById('diagBox');
  box.style.display = 'block';
  box.innerHTML = `
    <strong>⚠️ Problema detectado — siga os passos abaixo:</strong><br><br>
    ${erros.map((e,i) => `<b>${i+1}.</b> ${e}`).join('<br>')}
    <br><br>
    <b>Como corrigir:</b> Acesse <a href="https://app.supabase.com" target="_blank" style="color:var(--green)">app.supabase.com</a>
    → seu projeto → <b>SQL Editor</b> → cole e execute o arquivo <code>supabase_schema.sql</code> que está no seu repositório GitHub.
  `;
}

// ── INIT ──
async function init() {
  try {
    sb = window.supabase.createClient(SB_URL, SB_KEY);
  } catch(e) {
    document.getElementById('lista').innerHTML = `<div class="msg err">❌ Erro ao inicializar Supabase: ${e.message}</div>`;
    return;
  }

  // Testa conexão com tabela lojas
  const { data: testLojas, error: errLojas } = await sb.from('lojas').select('id').limit(1);

  if (errLojas) {
    const erros = [];
    if (errLojas.message.includes('relation') || errLojas.code === '42P01') {
      erros.push('A tabela <code>lojas</code> não existe no Supabase.');
      erros.push('A tabela <code>visitas</code> provavelmente também não existe.');
    } else if (errLojas.message.includes('JWT') || errLojas.code === 'PGRST301') {
      erros.push('Chave de API inválida ou expirada.');
    } else {
      erros.push(`Erro de conexão: <code>${errLojas.message}</code>`);
    }
    mostrarDiag(erros);
    document.getElementById('lista').innerHTML = `<div class="msg err">❌ Tabelas não encontradas no banco de dados.</div>`;
    document.getElementById('sTotal').textContent = '!';
    document.getElementById('sVisit').textContent = '!';
    document.getElementById('sPend').textContent = '!';
    return;
  }

  // Tabelas OK — carrega lojas
  await carregarLojas();
  document.getElementById('dtHistorico').value = hoje();
  setInterval(carregarLojas, 60000);
}

// ── CARREGAR LOJAS ──
async function carregarLojas() {
  // Tenta view primeiro
  let { data, error } = await sb.from('visitas_hoje').select('*').order('zona').order('nome_loja');

  if (error) {
    // Fallback direto nas tabelas
    const { data: ls, error: e2 } = await sb.from('lojas').select('*').eq('ativa', true).order('zona').order('nome_loja');
    if (e2) { document.getElementById('lista').innerHTML = `<div class="msg err">❌ ${e2.message}</div>`; return; }

    const d = hoje();
    const { data: vs } = await sb.from('visitas').select('loja_id, visitada_em')
      .gte('visitada_em', d + 'T00:00:00').lte('visitada_em', d + 'T23:59:59');
    const vm = {};
    (vs||[]).forEach(v => { if (!vm[v.loja_id] || v.visitada_em > vm[v.loja_id]) vm[v.loja_id] = v.visitada_em; });
    data = (ls||[]).map(l => ({ ...l, visitada_hoje: !!vm[l.id], ultima_visita: vm[l.id]||null }));
  }

  lojas = data || [];
  renderPills();
  renderLista();
  renderStats();
}

function renderStats() {
  const v = lojas.filter(l => l.visitada_hoje).length;
  document.getElementById('sTotal').textContent = lojas.length;
  document.getElementById('sVisit').textContent = v;
  document.getElementById('sPend').textContent  = lojas.length - v;
}

function renderPills() {
  const zonas = ['Todas', ...new Set(lojas.map(l => l.zona).filter(Boolean))];
  document.getElementById('pills').innerHTML = zonas.map(z =>
    `<span class="pill ${zonaAtiva===z?'active':''}" onclick="setZona('${z}')">${z}</span>`
  ).join('');
}

function setZona(z) { zonaAtiva = z; renderPills(); renderLista(); }
function filtrar()  { renderLista(); }

function renderLista() {
  const q = document.getElementById('busca').value.toLowerCase();
  const fl = lojas.filter(l => {
    const mz = zonaAtiva === 'Todas' || l.zona === zonaAtiva;
    const ms = !q || (l.nome_loja||'').toLowerCase().includes(q) || (l.bairro||'').toLowerCase().includes(q);
    return mz && ms;
  });

  if (!fl.length) {
    document.getElementById('lista').innerHTML = '<div class="msg">Nenhuma loja encontrada</div>';
    return;
  }

  document.getElementById('lista').innerHTML = fl.map(l => {
    const hora = l.ultima_visita
      ? new Date(l.ultima_visita).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
      : null;
    return `
    <div class="loja-item ${l.visitada_hoje?'visitada':''}" id="it-${l.id}">
      <div class="dot ${l.visitada_hoje?'ok':''}"></div>
      <div class="loja-info">
        <div class="loja-nome">${l.nome_loja}</div>
        <div class="loja-end">${[l.logradouro, l.numero, l.bairro, l.cep].filter(Boolean).join(' · ')}</div>
        ${hora ? `<div class="hora-ok">✓ Visitada às ${hora}</div>` : ''}
      </div>
      <span class="badge">${l.zona||'?'}</span>
      <button class="btn-marcar" ${l.visitada_hoje?'disabled':''} onclick="marcar('${l.id}',this)">
        ${l.visitada_hoje ? '✓ Ok' : '📍 Marcar'}
      </button>
    </div>`;
  }).join('');
}

// ── MARCAR VISITA ──
async function marcar(id, btn) {
  btn.disabled = true; btn.textContent = '📡...';
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude, longitude, accuracy } = pos.coords;
    const { error } = await sb.from('visitas').insert({ loja_id: id, latitude_visita: latitude, longitude_visita: longitude, distancia_metros: accuracy });
    if (error) { toast('Erro: ' + error.message, 'err'); btn.disabled = false; btn.textContent = '📍 Marcar'; return; }

    const l = lojas.find(x => x.id === id);
    if (l) { l.visitada_hoje = true; l.ultima_visita = new Date().toISOString(); }

    const el = document.getElementById('it-' + id);
    if (el) {
      el.classList.add('visitada');
      el.querySelector('.dot').classList.add('ok');
      btn.textContent = '✓ Ok';
      const hora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      if (!el.querySelector('.hora-ok')) {
        el.querySelector('.loja-end').insertAdjacentHTML('afterend', `<div class="hora-ok">✓ Visitada às ${hora}</div>`);
      }
    }
    renderStats();
    toast('Visita registrada! 📍', 'ok');
  }, () => {
    btn.disabled = false; btn.textContent = '📍 Marcar';
    toast('Ative a localização do celular', 'err');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

// ── HISTÓRICO ──
async function carregarHistorico() {
  const d = document.getElementById('dtHistorico').value;
  if (!d) return;
  const el = document.getElementById('tblHistorico');
  el.innerHTML = '<div class="msg">Buscando...</div>';

  const { data, error } = await sb.from('visitas')
    .select('*, lojas(nome_loja, bairro, zona)')
    .gte('visitada_em', d + 'T00:00:00')
    .lte('visitada_em', d + 'T23:59:59')
    .order('visitada_em', { ascending: false });

  if (error) { el.innerHTML = `<div class="msg err">❌ ${error.message}</div>`; return; }
  if (!data?.length) { el.innerHTML = '<div class="msg">Nenhuma visita neste dia</div>'; return; }

  el.innerHTML = `
    <p style="font-size:0.78rem;color:var(--dim);margin-bottom:10px">${data.length} visita(s) em ${new Date(d+'T12:00:00').toLocaleDateString('pt-BR')}</p>
    <div class="table-wrap"><table>
      <thead><tr><th>Loja</th><th>Bairro</th><th>Zona</th><th>Horário</th></tr></thead>
      <tbody>${data.map(r => `
        <tr>
          <td>${r.lojas?.nome_loja||'—'}</td>
          <td>${r.lojas?.bairro||'—'}</td>
          <td>${r.lojas?.zona||'—'}</td>
          <td>${new Date(r.visitada_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
}

// ── PAINEL: UPLOAD ──
function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag'); }
function onDragLeave()  { document.getElementById('dropZone').classList.remove('drag'); }
function onDrop(e)      { e.preventDefault(); onDragLeave(); processarArquivo(e.dataTransfer.files[0]); }
function onFile(e)      { processarArquivo(e.target.files[0]); }

function processarArquivo(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    const wb  = XLSX.read(e.target.result, { type: 'binary' });
    const ws  = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

    const encontrar = (row, ...termos) => {
      const k = Object.keys(row).find(c => termos.some(t => c.toLowerCase().replace(/\s/g,'').includes(t)));
      return k ? String(row[k]).trim() : '';
    };

    const dados = rows.map(r => ({
      dn:              encontrar(r, 'dn'),
      cnpj:            encontrar(r, 'cnpj'),
      nome_loja:       encontrar(r, 'nomeloja', 'nome_loja', 'nome') || encontrar(r, 'loja'),
      logradouro:      encontrar(r, 'logradouro', 'rua', 'avenida', 'gcm', 'endereco'),
      numero:          encontrar(r, 'nº', 'numero', 'n°', 'num'),
      bairro:          encontrar(r, 'bairro'),
      cep:             encontrar(r, 'cep'),
      zona:            encontrar(r, 'zona'),
    })).filter(l => l.nome_loja);

    if (!dados.length) return toast('Nenhuma loja encontrada no arquivo', 'err');

    document.getElementById('preview').innerHTML = `
      <div style="margin-top:12px;padding:12px;background:var(--surface2);border-radius:8px;font-size:0.82rem">
        <strong>${dados.length} lojas encontradas</strong>
        <div style="color:var(--dim);margin-top:4px">Ex: ${dados[0].nome_loja} · ${dados[0].bairro}</div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-primary" onclick="importar(window._imp)">⬆ Importar agora</button>
          <button class="btn btn-outline" onclick="document.getElementById('preview').innerHTML=''">Cancelar</button>
        </div>
      </div>`;
    window._imp = dados;
  };
  r.readAsBinaryString(file);
}

async function importar(dados) {
  toast('Importando...', '');
  const { error } = await sb.from('lojas').insert(dados);
  if (error) return toast('Erro: ' + error.message, 'err');
  document.getElementById('preview').innerHTML = '';
  document.getElementById('fileIn').value = '';
  toast(`${dados.length} lojas importadas! ✅`, 'ok');
  carregarTabelaLojas();
  carregarLojas();
}

async function carregarTabelaLojas() {
  const el = document.getElementById('tblLojas');
  el.innerHTML = '<div class="msg">Carregando...</div>';
  const { data, error } = await sb.from('lojas').select('dn, nome_loja, bairro, zona').eq('ativa', true).order('nome_loja');
  if (error) { el.innerHTML = `<div class="msg err">❌ ${error.message}</div>`; return; }
  if (!data?.length) { el.innerHTML = '<div class="msg">Nenhuma loja cadastrada ainda</div>'; return; }
  el.innerHTML = `
    <p style="font-size:0.78rem;color:var(--dim);margin-bottom:10px">${data.length} lojas</p>
    <div class="table-wrap"><table>
      <thead><tr><th>DN</th><th>Nome</th><th>Bairro</th><th>Zona</th></tr></thead>
      <tbody>${data.map(l => `<tr><td>${l.dn||'—'}</td><td>${l.nome_loja}</td><td>${l.bairro||'—'}</td><td>${l.zona||'—'}</td></tr>`).join('')}
      </tbody>
    </table></div>`;
}

async function limpar() {
  if (!confirm('Apagar TODAS as lojas e visitas? Não pode ser desfeito.')) return;
  await sb.from('visitas').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await sb.from('lojas').delete().neq('id','00000000-0000-0000-0000-000000000000');
  toast('Dados apagados', 'ok');
  carregarTabelaLojas(); carregarLojas();
}

async function exportar() {
  const { data } = await sb.from('lojas').select('*').eq('ativa', true);
  if (!data?.length) return toast('Sem dados para exportar', 'err');
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Lojas');
  XLSX.writeFile(wb, 'lojas_exportadas.xlsx');
}

window.addEventListener('load', init);
</script>
